name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install @capacitor/core@latest @capacitor/android@latest @capacitor/cli@latest

      - name: Create Capacitor project
        run: |
          mkdir -p cap-project/www
          cp -r src/. cap-project/www/
          echo '{"appId":"com.ledbadge.s1144","appName":"LED Badge S1144","webDir":"www","server":{"androidScheme":"https"}}' > cap-project/capacitor.config.json
          echo '{"name":"led-badge-android","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest"}}' > cap-project/package.json
          cd cap-project
          npm install
          npx cap add android

      - name: Patch USB permission into AndroidManifest
        run: |
          MANIFEST=cap-project/android/app/src/main/AndroidManifest.xml
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-feature android:name="android.hardware.usb.host" />\n    <uses-permission android:name="android.permission.USB_PERMISSION" />|' "$MANIFEST"

      - name: Add USB device filter
        run: |
          mkdir -p cap-project/android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <usb-device vendor-id="1046" product-id="20512" />\n</resources>' > cap-project/android/app/src/main/res/xml/usb_device_filter.xml

      - name: Grant Gradle permission
        run: chmod +x cap-project/android/gradlew

      - name: Build debug APK
        run: |
          cd cap-project/android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LED-Badge-S1144-Android
          path: cap-project/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cap-project/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
